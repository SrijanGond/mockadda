// ── URL ROUTING (added for SEO — gives every exam a real, crawlable URL) ─────
function examUrl(catKey, examKey){
  return '/' + catKey.replace(/_/g,'-') + '/' + examKey.replace(/_/g,'-');
}
function parseUrlPath(){
  const parts = location.pathname.split('/').filter(Boolean);
  if(parts.length < 2) return null;
  const catSlug = parts[0], examSlug = parts[1];
  for(const [catKey, cat] of Object.entries(DATA)){
    if(catKey.replace(/_/g,'-') !== catSlug) continue;
    for(const [examKey, exam] of Object.entries(cat.exams)){
      if(examKey.replace(/_/g,'-') === examSlug){
        return { catKey, examKey, exam };
      }
    }
  }
  return null;
}
function navigateToExam(catKey, examKey, exam){
  const url = examUrl(catKey, examKey);
  if(location.pathname !== url) history.pushState({catKey,examKey}, '', url);
  document.title = exam.name + ' Free Mock Test | MockAdda';
  const metaDesc = document.querySelector('meta[name="description"]');
  if(metaDesc) metaDesc.setAttribute('content',
    'Practice free ' + exam.fullname + ' (' + exam.name + ') mock tests on MockAdda. Timed, exam-pattern questions with instant results.');
}
function navigateToHome(){
  if(location.pathname !== '/') history.pushState({}, '', '/');
  document.title = 'MockAdda – Free Online Mock Tests | SSC, Banking, Railways, Teaching';
  const metaDesc = document.querySelector('meta[name="description"]');

}

function getWordOfDay(){
  const now = new Date();
  const start = new Date(now.getFullYear(),0,0);
  const diff = now - start;
  const dayOfYear = Math.floor(diff / 86400000);
  return VOCAB_WORDS[dayOfYear % VOCAB_WORDS.length];
}

function el(tag,props={},children=[]){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(props)){
    if(k==='style') Object.assign(e.style,v);
    else if(k==='css') e.style.cssText=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html') e.innerHTML=v;
    else if(k==='text') e.textContent=v;
    else e.setAttribute(k,v);
  }
  children.filter(Boolean).forEach(c=>e.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return e;
}

// Darkens (negative percent) or lightens (positive percent) a hex color, e.g. shadeColor('#3b82f6', -20)
function shadeColor(hex, percent){
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.round(Math.min(255,Math.max(0,r+(percent/100)*255)));
  g=Math.round(Math.min(255,Math.max(0,g+(percent/100)*255)));
  b=Math.round(Math.min(255,Math.max(0,b+(percent/100)*255)));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

const MISTAKES_KEY = 'mockadda_mistakes_v1';
function loadMistakes(){
  try{ return JSON.parse(localStorage.getItem(MISTAKES_KEY) || '[]'); }catch(e){ return []; }
}
function saveMistakesList(list){
  try{ localStorage.setItem(MISTAKES_KEY, JSON.stringify(list)); }catch(e){ /* storage unavailable — fail silently */ }
}
function isMistakeSaved(qText){
  return loadMistakes().some(m=>m.q===qText);
}
function toggleMistake(q){
  const list = loadMistakes();
  const idx = list.findIndex(m=>m.q===q.q);
  if(idx>-1){ list.splice(idx,1); } else { list.push({...q, savedAt:Date.now()}); }
  saveMistakesList(list);
}

// ── STUDY STREAK TRACKER (saved on this device via localStorage) ─────────────
const STREAK_KEY = 'mockadda_streak_v1';
function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function loadStreak(){
  try{ return JSON.parse(localStorage.getItem(STREAK_KEY)) || {lastActiveDate:null, currentStreak:0, longestStreak:0, totalSessions:0}; }
  catch(e){ return {lastActiveDate:null, currentStreak:0, longestStreak:0, totalSessions:0}; }
}
function recordActivity(){
  const s = loadStreak();
  const today = todayStr();
  if(s.lastActiveDate===today){ s.totalSessions++; }
  else {
    const yesterday = new Date(Date.now()-86400000);
    const yStr = yesterday.getFullYear()+'-'+String(yesterday.getMonth()+1).padStart(2,'0')+'-'+String(yesterday.getDate()).padStart(2,'0');
    s.currentStreak = (s.lastActiveDate===yStr) ? s.currentStreak+1 : 1;
    s.longestStreak = Math.max(s.longestStreak, s.currentStreak);
    s.lastActiveDate = today;
    s.totalSessions = (s.totalSessions||0)+1;
  }
  try{ localStorage.setItem(STREAK_KEY, JSON.stringify(s)); }catch(e){}
  return s;
}

// Groups a test's questions by subject, in first-seen order. Returns null if the
// test has no subject data at all, or only one subject (tabs aren't useful with just one).
function getSubjectSections(test){
  const hasSubjects = test.questions.some(q=>q.subject);
  if(!hasSubjects) return null;
  const order=[], map={};
  test.questions.forEach((q,i)=>{
    const subj = q.subject || 'General';
    if(!map[subj]){ map[subj]=[]; order.push(subj); }
    map[subj].push(i);
  });
  const sections = order.map(subj=>({subject:subj, indices:map[subj]}));
  return sections.length>1 ? sections : null;
}

// Marking scheme for a test — defaults to +1/0 (no negative marking) unless the
// test JSON explicitly sets correctMarks / negativeMarks.
function getMarkingScheme(test){
  return {
    correct: (typeof test.correctMarks==='number') ? test.correctMarks : 1,
    wrong: (typeof test.negativeMarks==='number') ? test.negativeMarks : 0
  };
}

// ── QUIZ LOGIC ────────────────────────────────────────────────────────────────
function startQuiz(catKey,examKey,test,returnScreen){
  S.activeCatKey=catKey; S.activeExamKey=examKey;
  S.activeExam=(catKey && DATA[catKey] && DATA[catKey].exams) ? DATA[catKey].exams[examKey] : null;
  S.returnScreen = returnScreen || 'tests';
  S.test={...test,questions:[...test.questions]};
  S.qi=0;S.ans={};S.flagged=new Set();S.visited=new Set([0]);
  S.timeLeft=test.duration*60;S.startTime=Date.now();
  S.navOpen=false;S.confirm=false;S.reviewOpen=false;S.stopConfirm=false;

  S.sectional = !!test.sectional;
  S.sectionLocked = new Set();
  if(S.sectional){
    S.sectionsCache = getSubjectSections(S.test) || [];
    S.sectionIndex = 0;
    S.sectionDurationSec = test.sectionDurationSec || Math.round((test.duration*60)/(S.sectionsCache.length||1));
    S.sectionTimeLeft = S.sectionDurationSec;
    if(S.sectionsCache.length){ S.qi = S.sectionsCache[0].indices[0]; S.visited=new Set([S.qi]); }
  } else {
    S.sectionsCache=null; S.sectionIndex=0; S.sectionTimeLeft=0; S.sectionDurationSec=0;
  }

  S.screen='quiz';render();startTimer();
}
function startTimer(){
  clearInterval(timerHandle);
  timerHandle=setInterval(()=>{
    S.timeLeft=Math.max(0,S.timeLeft-1); // overall exam time, always tracked (used for results timeTaken + total-remaining display)
    if(S.sectional){
      S.sectionTimeLeft=Math.max(0,S.sectionTimeLeft-1);
      if(S.sectionTimeLeft===0){ advanceSection(); return; }
    } else if(S.timeLeft===0){
      clearInterval(timerHandle);submit();return;
    }
    const d=document.getElementById('timerDisp');
    if(d){
      const displaySec = S.sectional ? S.sectionTimeLeft : S.timeLeft;
      d.textContent=fmt(displaySec);
      if(displaySec<60){ d.style.background=CBT.red; d.style.boxShadow='0 4px 14px rgba(220,38,38,0.4)'; }
    }
  },1000);
}

// Called when a section's 15-minute timer hits 0, OR the student manually ends the section early.
// Locks every question in the finishing section (no going back), then moves to the next section's
// first question with a fresh timer — or submits the whole test if this was the last section.
function advanceSection(){
  const sections=S.sectionsCache;
  if(!sections || !sections.length){ clearInterval(timerHandle); submit(); return; }
  const cur=sections[S.sectionIndex];
  cur.indices.forEach(i=>S.sectionLocked.add(i));
  if(S.sectionIndex>=sections.length-1){
    clearInterval(timerHandle); submit(); return;
  }
  S.sectionIndex++;
  const next=sections[S.sectionIndex];
  S.sectionTimeLeft=S.sectionDurationSec;
  S.qi=next.indices[0];
  S.visited.add(S.qi);
  render();
}
function goQ(idx){ if(S.sectionLocked.has(idx)) return; S.visited.add(idx);S.qi=idx;S.navOpen=false;render();}
function submit(){
  clearInterval(timerHandle);
  if(S.startTime) S.timeTaken=Math.floor((Date.now()-S.startTime)/1000);
  recordActivity();
  S.screen='results';S.confirm=false;S.navOpen=false;render();
}
function getResults(){
  if(!S.test) return null;
  let correct=0,wrong=0;
  S.test.questions.forEach((q,i)=>{
    if(S.ans[i]===undefined) return;
    S.ans[i]===q.ans?correct++:wrong++;
  });
  const total=S.test.questions.length;
  const marks=getMarkingScheme(S.test);
  const marksScored=correct*marks.correct - wrong*marks.wrong;
  const maxMarks=total*marks.correct;
  return{correct,wrong,unattempted:total-correct-wrong,score:Math.round((correct/total)*100),total,marksScored,maxMarks,marks};
}

function getSubjectBreakdown(){
  if(!S.test) return null;
  const hasSubjects = S.test.questions.some(q=>q.subject);
  if(!hasSubjects) return null;
  const bySubject = {};
  S.test.questions.forEach((q,i)=>{
    const subj = q.subject || 'Other';
    if(!bySubject[subj]) bySubject[subj] = {correct:0,wrong:0,unattempted:0,total:0};
    bySubject[subj].total++;
    const ua = S.ans[i];
    if(ua===undefined) bySubject[subj].unattempted++;
    else if(ua===q.ans) bySubject[subj].correct++;
    else bySubject[subj].wrong++;
  });
  return bySubject;
}

const SUBJECT_TIPS = {
  history:'Build a timeline of major events and revise it weekly rather than reading randomly.',
  polity:'Focus on the Constitution\'s articles, amendments, and key facts — these repeat across exams.',
  geography:'Study with a map open — visual memory of locations sticks far better than text alone.',

  'current affairs':'Read a daily digest and note only exam-relevant facts — dates, names, numbers.',

  science:'Revisit NCERT-level science basics — most questions test fundamentals, not advanced concepts.',

function subjectTip(subject){
  const key = String(subject||'').toLowerCase().trim();
  return SUBJECT_TIPS[key] || ('Review your basics in '+subject+' and practice more MCQs regularly to build confidence.');
}

function buildQuizInsights(results, breakdown, singleSubject){
  const strengths=[], weaknesses=[], tips=[];
  if(breakdown){
    const rows=[];
    Object.keys(breakdown).forEach(subj=>{
      const b=breakdown[subj];
      const attempted=b.correct+b.wrong;
      if(!attempted) return; // fully skipped subject — not enough info to judge
      const accuracy=Math.round((b.correct/attempted)*100);
      rows.push({subj,accuracy});
      if(accuracy>=80) strengths.push(subj+' — '+accuracy+'% accuracy');
      else if(accuracy<50){ weaknesses.push(subj+' — '+accuracy+'% accuracy'); tips.push(subjectTip(subj)); }
    });
    // if nothing crossed the absolute weak threshold, still call out the relatively weakest subject
    if(!weaknesses.length && rows.length>1){
      const worst = rows.reduce((a,b)=> (b.accuracy<a.accuracy ? b : a));
      weaknesses.push(worst.subj+' — your relatively weakest subject ('+worst.accuracy+'% accuracy)');
      tips.push(subjectTip(worst.subj));
    }
  } else if(singleSubject){
    const attempted=results.correct+results.wrong;
    if(attempted){
      const accuracy=Math.round((results.correct/attempted)*100);
      if(accuracy>=80) strengths.push(singleSubject+' — '+accuracy+'% accuracy');
      else if(accuracy<50){ weaknesses.push(singleSubject+' — '+accuracy+'% accuracy'); tips.push(subjectTip(singleSubject)); }
    }
  }
  if(results.unattempted > results.total*0.2){
    weaknesses.push(results.unattempted+' question(s) left unattempted');
    tips.push('Try to attempt every question — even an educated guess has a chance, while a skip guarantees zero.');
  }
  if(results.score>=80) strengths.push('Strong overall score ('+results.score+'%)');
  if(!strengths.length) strengths.push('Keep practicing — your strengths will show up as you build consistency.');
  if(!weaknesses.length) weaknesses.push('No major weak areas found in this test — well done!');
  return { strengths, weaknesses, tips:[...new Set(tips)] };
}
function qStatus(i){
  if(!S.visited.has(i)) return 'unvisited';
  const a=S.ans[i]!==undefined,f=S.flagged.has(i);
  if(a&&f) return 'ans-flag';if(a) return 'answered';if(f) return 'flagged';return 'visited';
}
function totalExams(){return Object.values(DATA).reduce((a,c)=>a+Object.keys(c.exams).length,0);}
function totalTests(){return Object.values(DATA).reduce((a,c)=>a+Object.values(c.exams).reduce((b,e)=>b+e.tests.length,0),0);}
function qCount(t){return t.questions?t.questions.length:(t.questionCount||0);}
function totalQuestions(){return Object.values(DATA).reduce((a,c)=>a+Object.values(c.exams).reduce((b,e)=>b+e.tests.reduce((d,t)=>d+qCount(t),0),0),0);}

  hdr.appendChild(el('button',{css:'background:none;border:none;color:#64748b;font-size:13px;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;gap:4px;padding:0;',text:'← Back',onClick:()=>go('exams')}));
  hdr.appendChild(el('div',{css:'display:flex;align-items:center;gap:8px;margin-bottom:6px;'},[el('span',{css:`background:${cat.color};color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;`,text:cat.name})]));
  hdr.appendChild(el('h2',{css:'font-family:Syne,sans-serif;font-weight:800;font-size:20px;color:#0f172a;margin-bottom:3px;',text:exam.name}));
  hdr.appendChild(el('p',{css:'font-size:12px;color:#64748b;',text:exam.fullname}));
  root.appendChild(hdr);
  const body=el('div',{css:'padding:20px;max-width:800px;margin:0 auto;'});
  body.appendChild(el('p',{css:'font-size:13px;color:#64748b;margin-bottom:18px;line-height:1.6;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;',text:'⚠️ Tests are timed. Once started, the timer cannot be paused. The test auto-submits when time expires.'}));
  exam.tests.forEach((t,i)=>{
    const dc={Easy:['#f0fdf4','#16a34a'],Medium:['#fffbeb','#d97706'],Hard:['#fef2f2','#dc2626']}[t.difficulty]||['#f8fafc','#64748b'];
    const card=el('div',{css:`background:#fff;border:1.5px solid #e2e8f0;border-left:5px solid ${cat.color};border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px ${cat.color}1a;`});
    const top=el('div',{css:'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;'});
    top.appendChild(el('div',{},[el('div',{css:'font-family:Syne,sans-serif;font-weight:700;font-size:15px;color:#0f172a;margin-bottom:3px;',text:t.title}),el('div',{css:'font-size:11px;color:#94a3b8;',text:`Mock Test ${i+1}`})]));
    top.appendChild(el('span',{css:`background:${dc[0]};color:${dc[1]};font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;`,text:t.difficulty}));
    card.appendChild(top);
    const meta=el('div',{css:'display:flex;gap:18px;margin-bottom:16px;'});
    [['⏱',`${t.duration} min`],['❓',`${qCount(t)} Questions`],['📝','MCQ Format']].forEach(([ic,tx])=>meta.appendChild(el('div',{css:'display:flex;align-items:center;gap:5px;font-size:12px;color:#64748b;'},[el('span',{text:ic}),tx])));
    card.appendChild(meta);
    const btn=el('button',{css:`width:100%;padding:13px;background:linear-gradient(135deg,${cat.color},${shadeColor(cat.color,-18)});color:#fff;border:none;border-radius:10px;font-family:Syne,sans-serif;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 3px 10px ${cat.color}4d;`,text:'Start Mock Test →'});
    btn.addEventListener('click',async()=>{
      if(btn.dataset.loading) return;
      btn.dataset.loading='1';
      btn.textContent='Loading...';btn.style.opacity='0.7';
      try{
        const fullTest=await loadFullTest(S.activeExamKey,t.id,t);
        btn.style.opacity='1';delete btn.dataset.loading;btn.textContent='Start Mock Test →';
        startQuiz(S.activeCatKey,S.activeExamKey,fullTest);
      }catch(e){
        btn.textContent='Failed — Tap to Retry';btn.style.opacity='1';delete btn.dataset.loading;
      }
    });
    card.appendChild(btn);body.appendChild(card);
  });
  root.appendChild(body);root.appendChild(Footer());
  return root;
}

// ── QUIZ SCREEN ───────────────────────────────────────────────────────────────
function quizScreen(){
  const test=S.test,qs=test.questions,q=qs[S.qi],sel=S.ans[S.qi];
  const cat=DATA[S.activeCatKey];
  const accent=cat?cat.color:'#0ea5e9';
  const answered=Object.keys(S.ans).length;
  const sections=getSubjectSections(test);
  const marks=getMarkingScheme(test);
  const currentSubject=q.subject||null;

  const root=el('div',{css:`min-height:100vh;background:${CBT.bg};font-family:'DM Sans',sans-serif;color:${CBT.text};`});

  // Minimal top utility bar — exit + mobile palette toggle only
  const topBar=el('div',{css:`position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid ${CBT.border};padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;`});
  topBar.appendChild(el('button',{css:`background:${CBT.gridBg};border:1px solid ${CBT.border};color:${CBT.muted};width:30px;height:30px;border-radius:8px;font-size:15px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;`,text:'✕',onClick:()=>{S.stopConfirm=true;render();}}));
  topBar.appendChild(el('button',{class:'qb-mobile-nav-btn',css:`background:${accent};color:#fff;border:none;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;`,text:`📋 ${answered}/${qs.length}`,onClick:()=>{S.navOpen=true;render();}}));
  root.appendChild(topBar);

  const container=el('div',{class:'qb-container',css:'max-width:1100px;margin:0 auto;padding:16px;'});
  const mainCol=el('div',{class:'qb-main-col'});

  // Exam title header
  const examHeader=el('div',{css:'text-align:center;margin-bottom:12px;'});
  examHeader.appendChild(el('div',{css:`font-family:Syne,sans-serif;font-weight:800;font-size:19px;color:${accent};`,text:(S.activeExam?S.activeExam.name:(cat?cat.name:'Mock Test'))}));
  examHeader.appendChild(el('div',{css:`font-family:Syne,sans-serif;font-weight:700;font-size:14px;color:${CBT.text};margin-top:2px;`,text:test.title}));
  mainCol.appendChild(examHeader);

  // Info bar: question count, time, marking scheme
  const infoBar=el('div',{css:`background:#fff;border:1px solid ${CBT.border};border-radius:10px;padding:10px 16px;margin-bottom:14px;display:flex;flex-wrap:wrap;justify-content:center;gap:6px 24px;font-size:12px;color:${CBT.text};`});
  const timeLabel = S.sectional ? test.duration+' min (strict '+Math.round(S.sectionDurationSec/60)+' min per section)' : test.duration+' min';
  const infoItems=[['Number Of Questions',String(qs.length)],['Time',timeLabel],['Correct Answer Carries','+'+marks.correct]];
  if(marks.wrong>0) infoItems.push(['Wrong Answer Carries','-'+marks.wrong]);
  infoItems.forEach(([label,val])=>{
    infoBar.appendChild(el('div',{},[el('strong',{text:label+': '}),val]));
  });
  mainCol.appendChild(infoBar);

  // Big countdown pill — shows CURRENT SECTION time when sectional, else overall exam time
  const displaySec = S.sectional ? S.sectionTimeLeft : S.timeLeft;
  const timerWrap=el('div',{css:'text-align:center;margin-bottom:8px;'});
  timerWrap.appendChild(el('div',{id:'timerDisp',css:`display:inline-block;background:${CBT.green};color:#fff;padding:10px 34px;border-radius:30px;font-family:Syne,sans-serif;font-weight:800;font-size:20px;box-shadow:0 4px 14px rgba(22,163,74,0.35);`,text:fmt(displaySec)}));
  mainCol.appendChild(timerWrap);
  if(S.sectional && S.sectionsCache && S.sectionsCache.length){
    mainCol.appendChild(el('div',{css:`text-align:center;font-size:11px;color:${CBT.muted};margin-bottom:14px;`,text:'Section '+(S.sectionIndex+1)+' of '+S.sectionsCache.length+' · Total time remaining: '+fmt(S.timeLeft)}));
  } else {
    mainCol.appendChild(el('div',{css:'margin-bottom:8px;'}));
  }

  // Subject section heading
  if(currentSubject){
    mainCol.appendChild(el('div',{css:`text-align:center;font-family:Syne,sans-serif;font-weight:800;font-size:17px;color:${CBT.text};margin-bottom:14px;`,text:currentSubject}));
  }

  // Question card
  const qCard=el('div',{css:`background:#fff;border:1px solid ${CBT.border};border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);`});
  const qTextWrap=el('div',{css:'display:flex;gap:8px;margin-bottom:18px;'});
  qTextWrap.appendChild(el('div',{css:`font-weight:700;color:${accent};flex-shrink:0;`,text:(S.qi+1)+'.'}));
  const qTextInner=el('div',{css:'flex:1;'});
  qTextInner.appendChild(el('div',{css:`font-size:15px;line-height:1.7;color:${CBT.text};`,text:q.q}));
  if(S.lang==='hi'&&q.q_hi){
    qTextInner.appendChild(el('div',{css:`font-size:14px;color:#4338ca;margin-top:6px;line-height:1.7;`,text:q.q_hi}));
  }
  qTextWrap.appendChild(qTextInner);
  qCard.appendChild(qTextWrap);

  // Options — classic radio-button rows, 2 per line
  const optsGrid=el('div',{css:'display:grid;grid-template-columns:1fr 1fr;gap:14px 20px;margin-bottom:18px;'});
  q.opts.forEach((opt,i)=>{
    const isSel=sel===i;
    const hindiOpt=(S.lang==='hi'&&q.opts_hi&&q.opts_hi[i])?q.opts_hi[i]:null;
    const row=el('label',{css:`display:flex;align-items:flex-start;gap:9px;cursor:pointer;font-size:14px;color:${CBT.text};padding:6px;border-radius:8px;`});
    const radio=el('input',{type:'radio',name:'qopt',css:`margin-top:3px;accent-color:${accent};cursor:pointer;flex-shrink:0;width:16px;height:16px;`});
    if(isSel) radio.checked=true;
    radio.addEventListener('change',()=>{S.ans[S.qi]=i;render();});
    row.appendChild(radio);
    const optText=el('div',{css:'flex:1;line-height:1.5;'});
    optText.appendChild(el('span',{css:'font-weight:600;margin-right:4px;',text:'('+(i+1)+')'}));
    if(hindiOpt){
      optText.appendChild(el('span',{text:hindiOpt}));
      optText.appendChild(el('div',{css:`font-size:12px;color:${CBT.muted};margin-top:2px;`,text:opt}));
    } else {
      optText.appendChild(el('span',{text:opt}));
    }
    row.appendChild(optText);
    optsGrid.appendChild(row);
  });
  qCard.appendChild(optsGrid);

  // Clear Response / Review Later
  const isFlagged=S.flagged.has(S.qi);
  const actionRow=el('div',{css:'display:flex;gap:10px;flex-wrap:wrap;'});
  actionRow.appendChild(el('button',{css:`padding:9px 18px;background:#fff;border:1.5px solid ${CBT.border};color:${CBT.text};border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;`,text:'Clear Response',onClick:()=>{delete S.ans[S.qi];render();}}));
  actionRow.appendChild(el('button',{css:`padding:9px 18px;background:${isFlagged?CBT.purple+'18':'#fff'};border:1.5px solid ${isFlagged?CBT.purple:CBT.border};color:${isFlagged?CBT.purple:CBT.text};border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;`,text:isFlagged?'✓ Marked for Review':'Review Later',onClick:()=>{isFlagged?S.flagged.delete(S.qi):S.flagged.add(S.qi);render();}}));
  qCard.appendChild(actionRow);
  mainCol.appendChild(qCard);

  // Previous / Save & Next / Submit Section / Submit Test — all section-aware
  const curSection = (S.sectional && S.sectionsCache) ? S.sectionsCache[S.sectionIndex] : null;
  const isSectionFirstQ = curSection ? (S.qi===curSection.indices[0]) : (S.qi===0);
  const isSectionLastQ = curSection ? (S.qi===curSection.indices[curSection.indices.length-1]) : (S.qi===qs.length-1);
  const isFinalSection = !S.sectional || (S.sectionsCache && S.sectionIndex===S.sectionsCache.length-1);
  const prevDisabled = S.sectional ? isSectionFirstQ : (S.qi===0);

  const navRow=el('div',{css:'display:flex;gap:10px;margin-bottom:20px;'});
  navRow.appendChild(el('button',{css:`flex:1;padding:12px;background:#fff;border:1.5px solid ${CBT.border};color:${prevDisabled?'#cbd5e1':CBT.text};border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;`,text:'← Previous',onClick:()=>{if(!prevDisabled)goQ(S.qi-1);}}));
  if(isSectionLastQ && isFinalSection){
    navRow.appendChild(el('button',{css:`flex:1;padding:12px;background:${CBT.green};border:none;color:#fff;border-radius:10px;font-family:Syne,sans-serif;font-weight:700;font-size:14px;cursor:pointer;`,text:'Submit Test',onClick:()=>{S.confirm=true;render();}}));
  } else if(isSectionLastQ && !isFinalSection){
    navRow.appendChild(el('button',{css:`flex:1;padding:12px;background:${accent};border:none;color:#fff;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer;`,text:'Submit Section & Continue →',onClick:()=>advanceSection()}));
  } else {
    navRow.appendChild(el('button',{css:`flex:1;padding:12px;background:${accent};border:none;color:#fff;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;`,text:'Save & Next →',onClick:()=>goQ(S.qi+1)}));
  }
  mainCol.appendChild(navRow);

  // Inline palette copy — always visible directly on the page on mobile (below the fold, via scroll),
  // so the question table is never missed. Hidden on desktop, where the sticky sidebar already shows it.
  const mobilePaletteWrap=el('div',{class:'qb-mobile-palette',css:'margin-bottom:20px;'});
  mobilePaletteWrap.appendChild(el('div',{css:`font-family:Syne,sans-serif;font-weight:700;font-size:13px;color:${CBT.text};margin-bottom:10px;`,text:'Question Palette'}));
  mobilePaletteWrap.appendChild(buildQuestionPalette(qs,sections,accent));
  mainCol.appendChild(mobilePaletteWrap);

  container.appendChild(mainCol);

  // Sidebar (desktop: always visible; mobile: hidden here since the inline copy above + the
  // quick-jump bottom sheet already cover it)
  const sidebar=el('div',{class:'qb-sidebar'});
  sidebar.appendChild(buildQuestionPalette(qs,sections,accent));
  container.appendChild(sidebar);

  root.appendChild(container);
  if(S.navOpen) root.appendChild(navPanel(qs,accent));
  if(S.confirm) root.appendChild(confirmPanel(qs,answered));
  if(S.stopConfirm) root.appendChild(stopConfirmPanel());
  return root;
}

// Shared question-palette builder — used both in the desktop sidebar and the mobile bottom sheet
function buildQuestionPalette(qs,sections,accent){
  const wrap=el('div',{css:`background:#fff;border:1px solid ${CBT.border};border-radius:14px;padding:16px;`});

  // Legend + counts — always computed across the WHOLE test, not just the visible subject
  const counts={unvisited:0,visited:0,answered:0,flagged:0,'ans-flag':0};
  qs.forEach((_,i)=>{counts[qStatus(i)]++;});
  const answeredTotal=counts.answered+counts['ans-flag'];
  const flaggedTotal=counts.flagged+counts['ans-flag'];
  const legend=el('div',{css:'display:flex;justify-content:space-between;margin-bottom:14px;'});
  [[CBT.green,'Answered',answeredTotal],[CBT.purple,'Marked',flaggedTotal],[CBT.unvisited,'Remaining',qs.length-answeredTotal]].forEach(([c,label,val])=>{
    legend.appendChild(el('div',{css:'text-align:center;flex:1;'},[
      el('div',{css:`width:14px;height:14px;background:${c};border-radius:3px;margin:0 auto 4px;`}),
      el('div',{css:`font-weight:700;font-size:13px;color:${CBT.text};`,text:String(val)}),
      el('div',{css:`color:${CBT.muted};font-size:10px;`,text:label})
    ]));
  });
  wrap.appendChild(legend);

  // Grid — global 1..N numbering by default (subject tabs below are just quick-jump shortcuts).
  // Only switches to subject-scoped local numbering + locking for tests with STRICT sectional
  // timing enabled (test.sectional === true), where real exams restrict you to the current section.
  const currentSubj=qs[S.qi]?qs[S.qi].subject:null;
  let gridIndices, localNumbering;
  if(S.sectional && sections){
    const activeSection=sections.find(s=>s.subject===currentSubj)||sections[0];
    gridIndices=activeSection.indices; localNumbering=true;
  } else {
    gridIndices=qs.map((_,i)=>i); localNumbering=false;
  }
  const grid=el('div',{css:'display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px;'});
  gridIndices.forEach((globalIdx,localIdx)=>{
    const st=qStatus(globalIdx),c=CBT_ST[st];
    const label=localNumbering?String(localIdx+1):String(globalIdx+1);
    const locked=S.sectionLocked.has(globalIdx);
    const btn=el('button',{
      css:locked
        ? `padding:8px 0;border-radius:8px;background:#f1f5f9;border:2px solid #e2e8f0;color:#cbd5e1;font-weight:700;font-size:12px;cursor:not-allowed;`
        : `padding:8px 0;border-radius:8px;background:${globalIdx===S.qi?c:'#fff'};border:2px solid ${c};color:${globalIdx===S.qi?'#fff':c};font-weight:700;font-size:12px;cursor:pointer;`,
      text:label
    });
    if(!locked) btn.addEventListener('click',()=>goQ(globalIdx));
    grid.appendChild(btn);
  });
  wrap.appendChild(grid);

  // Subject tabs — pure status indicators during sectional mode (no jumping between sections allowed);
  // fully clickable navigation when not sectional (e.g. regular multi-subject mock tests)
  if(sections){
    const tabWrap=el('div',{css:'display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;'});
    sections.forEach(sec=>{
      const isActive=sec.subject===currentSubj;
      const isLockedSection=S.sectional && sec.indices.every(i=>S.sectionLocked.has(i));
      const clickable=!S.sectional; // in sectional mode, tabs are display-only
      const tabBtn=el('button',{css:`padding:8px 14px;border-radius:8px;border:1.5px solid ${isActive?accent:CBT.border};background:${isActive?accent:isLockedSection?'#f1f5f9':'#fff'};color:${isActive?'#fff':isLockedSection?'#cbd5e1':CBT.text};font-size:12px;font-weight:700;cursor:${clickable?'pointer':'default'};`,text:(isLockedSection?'✓ ':'')+sec.subject});
      if(clickable) tabBtn.addEventListener('click',()=>goQ(sec.indices[0]));
      tabWrap.appendChild(tabBtn);
    });
    wrap.appendChild(tabWrap);
  }

  // Fullscreen + Submit
  const actionsRow=el('div',{css:'display:flex;gap:8px;'});
  const fsBtn=el('button',{css:`width:40px;height:40px;background:#fff;border:1.5px solid ${CBT.border};border-radius:8px;font-size:16px;cursor:pointer;flex-shrink:0;`,text:'⛶'});
  fsBtn.addEventListener('click',()=>{
    if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(()=>{}); }
    else { document.exitFullscreen().catch(()=>{}); }
  });
  actionsRow.appendChild(fsBtn);
  actionsRow.appendChild(el('button',{css:`flex:1;padding:10px;background:${CBT.green};border:none;color:#fff;border-radius:8px;font-family:Syne,sans-serif;font-weight:700;font-size:14px;cursor:pointer;`,text:'Submit',onClick:()=>{S.navOpen=false;S.confirm=true;render();}}));
  wrap.appendChild(actionsRow);

  return wrap;
}

function navPanel(qs,accent){
  const sections=getSubjectSections(S.test);
  const ov=el('div',{css:`position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;`});
  ov.addEventListener('click',()=>{S.navOpen=false;render();});
  const sheet=el('div',{css:`background:${CBT.bg};width:100%;border-radius:18px 18px 0 0;padding:18px;max-height:82vh;overflow-y:auto;`});
  sheet.addEventListener('click',e=>e.stopPropagation());
  sheet.appendChild(el('div',{css:'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;'},[
    el('div',{css:`font-family:Syne,sans-serif;font-weight:700;font-size:15px;color:${CBT.text};`,text:'Question Palette'}),
    el('button',{css:`background:none;border:none;color:${CBT.muted};font-size:22px;cursor:pointer;`,text:'✕',onClick:()=>{S.navOpen=false;render();}})
  ]));
  sheet.appendChild(buildQuestionPalette(qs,sections,accent));
  ov.appendChild(sheet);return ov;
}

function confirmPanel(qs,answered){
  const ov=el('div',{css:`position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;`});
  const box=el('div',{css:`background:#fff;border-radius:16px;padding:24px;border:1px solid ${CBT.border};width:100%;max-width:320px;box-shadow:0 10px 40px rgba(0,0,0,0.2);`});
  box.appendChild(el('div',{css:`font-family:Syne,sans-serif;font-weight:700;font-size:18px;margin-bottom:10px;color:${CBT.text};`,text:'Submit Test?'}));
  const rem=qs.length-answered;
  const al=el('div',{css:`font-size:13px;color:${CBT.muted};margin-bottom:6px;`});
  al.innerHTML=`Answered: <strong style="color:${CBT.green}">${answered}</strong> / ${qs.length}`;
  box.appendChild(al);
  box.appendChild(el('div',{css:`font-size:13px;color:${rem>0?CBT.red:CBT.green};margin-bottom:10px;`,text:rem>0?`⚠ ${rem} question(s) unattempted`:'✓ All questions attempted!'}));
  if(S.sectional && S.sectionsCache && S.sectionIndex<S.sectionsCache.length-1){
    box.appendChild(el('div',{css:`font-size:12px;color:${CBT.red};margin-bottom:18px;line-height:1.5;`,text:'⚠ You still have '+(S.sectionsCache.length-1-S.sectionIndex)+' section(s) remaining. Submitting now ends the exam immediately — you will NOT get to attempt them.'}));
  } else {
    box.appendChild(el('div',{css:'margin-bottom:8px;'}));
  }
  box.appendChild(el('div',{css:'display:flex;gap:10px;'},[
    el('button',{css:`flex:1;padding:12px;background:${CBT.gridBg};border:1px solid ${CBT.border};color:${CBT.text};border-radius:10px;cursor:pointer;font-weight:600;`,text:'Cancel',onClick:()=>{S.confirm=false;render();}}),
    el('button',{css:`flex:1;padding:12px;background:${CBT.green};border:none;color:#fff;border-radius:10px;cursor:pointer;font-family:Syne,sans-serif;font-weight:700;`,text:'Submit',onClick:submit})
  ]));
  ov.appendChild(box);return ov;
}

function stopConfirmPanel(){
  const ov=el('div',{css:`position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;`});
  const box=el('div',{css:`background:#fff;border-radius:16px;padding:24px;border:1px solid ${CBT.border};width:100%;max-width:320px;box-shadow:0 10px 40px rgba(0,0,0,0.2);`});
  box.appendChild(el('div',{css:`font-family:Syne,sans-serif;font-weight:700;font-size:18px;margin-bottom:10px;color:${CBT.text};`,text:'Stop this test?'}));
  box.appendChild(el('div',{css:`font-size:13px;color:${CBT.muted};margin-bottom:18px;line-height:1.5;`,text:'Your progress will not be saved and the timer will stop. You can start this test again anytime from the beginning.'}));

let SUBJECTS_META = null; // cached after first fetch
const SUBJECT_CACHE = {}; // slug -> questions[]

function slugify(s){
  return String(s||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
}

async function loadSubjectsMeta(){
  if(SUBJECTS_META) return SUBJECTS_META;
  try{
    const res = await fetch('/subjects_meta.json');
    if(!res.ok) throw new Error('not found');
    SUBJECTS_META = await res.json();
  }catch(e){
    SUBJECTS_META = {};
  }
  return SUBJECTS_META;
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

async function launchSubjectPractice(slug, name, count){
  const listWrap=document.getElementById('subjectsList');
  if(listWrap) listWrap.innerHTML='<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;">Loading questions...</div>';
  try{
    if(!SUBJECT_CACHE[slug]){
      const res = await fetch('/subjects/'+slug+'.json');
      if(!res.ok) throw new Error('Failed to load subject data');
      const data = await res.json();
      SUBJECT_CACHE[slug] = data.questions || [];
    }
    const pool = SUBJECT_CACHE[slug];
    const sampleSize = Math.min(20, pool.length);
    const questions = shuffle(pool).slice(0, sampleSize);
    const duration = Math.max(10, Math.round(sampleSize * 1));
    const test = { id:'subject-'+slug+'-'+Date.now(), title:name+' — Subject Practice', duration, difficulty:'Mixed', questions, practiceSubject:name };
    startQuiz(null, null, test, 'subjectsHome');
  }catch(e){
    if(listWrap) listWrap.innerHTML='<div style="text-align:center;padding:30px;color:#dc2626;font-size:13px;">Could not load this subject right now. Please try again.</div>';
  }
}

function buildRepeatedText(base, durationSec){
  // Generous upper bound so even a very fast typist (100+ WPM) never runs out of text before time is up
  const estCharsNeeded = Math.ceil((durationSec/60) * 110 * 5) + 500;
  let out = base;
  while(out.length < estCharsNeeded){ out += ' ' + base; }
  return out;
}

function startTypingTest(passage){
  T.passage=passage;T.fullText=buildRepeatedText(passage.text,T.duration);T.typed='';T.startTime=null;T.timeLeft=T.duration;T.finished=false;T.results=null;T.corrections=0;
  S.screen='typingTest';render();
}

function insertAtCursor(textarea, text){
  const start = textarea.selectionStart;
  const end = textarea.selectionEnd;
  const val = textarea.value;
  textarea.value = val.slice(0,start) + text + val.slice(end);
  const newPos = start + text.length;
  textarea.selectionStart = textarea.selectionEnd = newPos;
}

function onTypingInput(e){
  if(T.finished) return;
  if(!T.startTime){ T.startTime=Date.now(); startTypingTimer(); }
  T.typed = e.target.value;
  updateTypingDisplay();
  if(T.typed.length >= T.fullText.length){ finishTypingTest('complete'); }
}

function charCategory(ch){
  if(/[0-9]/.test(ch)) return 'numbers';
  if(/\s/.test(ch)) return 'spaces';
  if(/[a-zA-Zअ-ह]/.test(ch)) return 'letters';
  return 'punctuation';
}

function updateTypingDisplay(){
  const target = T.fullText;
  let errors = 0;
  for(let i=0;i<T.typed.length;i++){
    const span = document.getElementById('ch'+i);
    if(!span) continue;
    const isCorrect = T.typed[i] === target[i];
    if(!isCorrect) errors++;
    span.style.color = isCorrect ? '#16a34a' : '#dc2626';
    span.style.textDecoration = isCorrect ? 'none' : 'underline';
    span.style.background = 'transparent';
  }
  const curSpan = document.getElementById('ch'+T.typed.length);
  if(curSpan){
    curSpan.style.color = '#0f172a';
    curSpan.style.background = '#0891b230';
    curSpan.scrollIntoView({block:'nearest'});
  }
  for(let i=T.typed.length+1;i<Math.min(target.length,T.typed.length+400);i++){
    const span = document.getElementById('ch'+i);
    if(!span) continue;
    span.style.color = '#64748b';
    span.style.background = 'transparent';
    span.style.textDecoration = 'none';
  }
  const elapsedMin = T.startTime ? Math.max((Date.now()-T.startTime)/60000, 1/60) : 1/60;
  const correctChars = T.typed.length - errors;
  const wpm = Math.max(0, Math.round((correctChars/5)/elapsedMin));
  const accuracy = T.typed.length ? Math.round((correctChars/T.typed.length)*100) : 100;
  const wpmEl=document.getElementById('statWPM'), accEl=document.getElementById('statAccuracy'), errEl=document.getElementById('statErrors');
  if(wpmEl) wpmEl.textContent = String(wpm);
  if(accEl) accEl.textContent = accuracy+'%';
  if(errEl) errEl.textContent = String(errors);
}

function startTypingTimer(){
  clearInterval(typingTimerHandle);
  typingTimerHandle = setInterval(()=>{
    T.timeLeft = Math.max(0, T.timeLeft-1);
    const d=document.getElementById('typingTimerDisp');
    if(d){
      d.textContent = '⏱ '+fmt(T.timeLeft);
      if(T.timeLeft<10){ d.style.background='#fef2f2'; d.style.color='#dc2626'; }
    }
    if(T.timeLeft===0){ finishTypingTest('timeup'); }
  },1000);
}
function stopTypingTimer(){ clearInterval(typingTimerHandle); }

function finishTypingTest(reason){
  if(T.finished) return;
  T.finished = true;
  stopTypingTimer();
  const target = T.fullText;
  const typed = T.typed;
  let errors = 0;
  const compareLen = Math.min(typed.length, target.length);

  // category-level breakdown for weak/strong-point analysis
  const cats = { letters:{total:0,wrong:0}, numbers:{total:0,wrong:0}, punctuation:{total:0,wrong:0}, spaces:{total:0,wrong:0} };
  for(let i=0;i<compareLen;i++){
    const cat = charCategory(target[i]);
    cats[cat].total++;
    if(typed[i]!==target[i]){ errors++; cats[cat].wrong++; }
  }

  const elapsedSec = T.startTime ? (Date.now()-T.startTime)/1000 : T.duration - T.timeLeft;
  const elapsedMin = Math.max(elapsedSec/60, 1/60);
  const correctChars = typed.length - errors;
  const wpm = Math.max(0, Math.round((correctChars/5)/elapsedMin));
  const accuracy = typed.length ? Math.round((correctChars/typed.length)*100) : 0;
  const correctionRate = typed.length ? Math.round((T.corrections/typed.length)*100) : 0;

  T.results = { wpm, accuracy, errors, typedChars: typed.length, totalChars: target.length,
    timeTaken: Math.round(elapsedSec), reason, cats, corrections: T.corrections, correctionRate };
  if(typed.length>=15) recordActivity();
  S.screen='typingResults';render();
}

const CATEGORY_LABELS = { letters:'Letters', numbers:'Numbers', punctuation:'Punctuation', spaces:'Spacing' };
const CATEGORY_TIPS = {
  letters:'Practice touch typing without looking at the keyboard — it builds accuracy on letter keys fastest.',
  numbers:'Spend a few minutes daily on the number row (1–0) — it\'s usually the least-practiced part of the keyboard.',
  punctuation:'Slow down slightly around commas, periods and other punctuation — these are commonly rushed and mistyped.',
  spaces:'You\'re mistiming the spacebar — this usually means rushing to the next word. Slow down slightly between words.'
};

function buildTypingInsights(r){
  const strengths=[], weaknesses=[], tips=[];
  if(r.typedChars<15){
    return { strengths:['Not enough was typed to analyze — try completing more of the passage next time.'],
             weaknesses:['No data to analyze yet'], tips:[] };
  }
  const catRates = Object.keys(r.cats)
    .map(cat=>({cat, ...r.cats[cat], rate: r.cats[cat].total ? r.cats[cat].wrong/r.cats[cat].total : null}))
    .filter(c=>c.total>=3);
  catRates.forEach(c=>{
    if(c.rate<=0.04) strengths.push(CATEGORY_LABELS[c.cat]+' — very accurate');
    else if(c.rate>0.15){ weaknesses.push(CATEGORY_LABELS[c.cat]+' — '+Math.round(c.rate*100)+'% error rate'); tips.push(CATEGORY_TIPS[c.cat]); }
  });
  // if nothing crossed the absolute weakness threshold, still call out the relatively weakest category as a growth area
  if(!weaknesses.length && catRates.length){
    const worst = catRates.reduce((a,b)=> (b.rate>a.rate ? b : a));
    if(worst.rate>0){ weaknesses.push(CATEGORY_LABELS[worst.cat]+' — your relatively weakest area ('+Math.round(worst.rate*100)+'% error rate)'); tips.push(CATEGORY_TIPS[worst.cat]); }
  }
  if(r.accuracy>=95) strengths.push('Overall accuracy is excellent');
  else if(r.accuracy<85){ weaknesses.push('Overall accuracy ('+r.accuracy+'%) needs work'); tips.push('Focus on accuracy over speed for now — a slower, error-free pace naturally gets faster with practice.'); }
  if(r.wpm>=40) strengths.push('Good typing speed ('+r.wpm+' WPM)');
  else if(r.wpm<20){ weaknesses.push('Typing speed ('+r.wpm+' WPM) is on the slower side'); tips.push('Practice for just 10–15 minutes daily rather than long, infrequent sessions — consistency builds speed fastest.'); }
  if(r.correctionRate>15){ weaknesses.push('Frequent corrections ('+r.correctionRate+'% of keystrokes were backspace/delete)'); tips.push('You\'re backspacing a lot — try typing each word deliberately once rather than rushing and correcting.'); }
  if(!strengths.length) strengths.push('Keep practicing — your strengths will show up as you build consistency.');
  if(!weaknesses.length) weaknesses.push('No major weak areas found in this test — well done!');
  return { strengths, weaknesses, tips: [...new Set(tips)] };
}

render();
const EXAM_CACHE = {};
async function loadFullTest(examKey, testId, metaTest){
  if(!EXAM_CACHE[examKey]){
    const res = await fetch(`/${examKey}.json`);
    if(!res.ok) throw new Error('Failed to load exam data');
    EXAM_CACHE[examKey] = await res.json();
  }
  const full = EXAM_CACHE[examKey].tests.find(x=>x.id===testId);
  return full || metaTest;
}
window.addEventListener('popstate', ()=>{
  const match = parseUrlPath();
  if(match){ S.activeCatKey=match.catKey; S.activeExamKey=match.examKey; S.activeExam=match.exam; S.screen='tests'; }
  else { S.screen='home'; }
  render();
});
async function boot(){
  try{
    const res = await fetch('/meta.json');
    DATA = await res.json();
  }catch(e){
    console.error('Failed to load MockAdda data', e);
    DATA = {};
  }
  const match = parseUrlPath();
  if(match){
    S.activeCatKey=match.catKey; S.activeExamKey=match.examKey; S.activeExam=match.exam;
    navigateToExam(match.catKey, match.examKey, match.exam);
    S.screen='tests';
  } else {
    S.screen='home';
  }
  render();
}
boot();
