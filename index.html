function getWordOfDay(){

  const diff = now - start;
  const dayOfYear = Math.floor(diff / 86400000);
  return VOCAB_WORDS[dayOfYear % VOCAB_WORDS.length];
}

function el(tag,props={},children=[]){
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(props)){
    if(k==='style') Object.assign(e.style,v);
    else if(k==='css') e.style.cssText=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html') e.innerHTML=v;
    else if(k==='text') e.textContent=v;
    else e.setAttribute(k,v);
  }
  children.filter(Boolean).forEach(c=>e.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return e;
}

// Darkens (negative percent) or lightens (positive percent) a hex color, e.g. shadeColor('#3b82f6', -20)
function shadeColor(hex, percent){
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.round(Math.min(255,Math.max(0,r+(percent/100)*255)));
  g=Math.round(Math.min(255,Math.max(0,g+(percent/100)*255)));
  b=Math.round(Math.min(255,Math.max(0,b+(percent/100)*255)));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ── MISTAKE NOTEBOOK (saved on this device via localStorage) ─────────────────
const MISTAKES_KEY = 'mockadda_mistakes_v1';
function loadMistakes(){
  try{ return JSON.parse(localStorage.getItem(MISTAKES_KEY) || '[]'); }catch(e){ return []; }
}
function saveMistakesList(list){
  try{ localStorage.setItem(MISTAKES_KEY, JSON.stringify(list)); }catch(e){ /* storage unavailable — fail silently */ }
}
function isMistakeSaved(qText){
  return loadMistakes().some(m=>m.q===qText);
}
function toggleMistake(q){
  const list = loadMistakes();
  const idx = list.findIndex(m=>m.q===q.q);
  if(idx>-1){ list.splice(idx,1); } else { list.push({...q, savedAt:Date.now()}); }
  saveMistakesList(list);
}

// ── STUDY STREAK TRACKER (saved on this device via localStorage) ─────────────
const STREAK_KEY = 'mockadda_streak_v1';
function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function loadStreak(){
  try{ return JSON.parse(localStorage.getItem(STREAK_KEY)) || {lastActiveDate:null, currentStreak:0, longestStreak:0, totalSessions:0}; }
  catch(e){ return {lastActiveDate:null, currentStreak:0, longestStreak:0, totalSessions:0}; }
}
function recordActivity(){
  const s = loadStreak();
  const today = todayStr();
  if(s.lastActiveDate===today){ s.totalSessions++; }
  else {
    const yesterday = new Date(Date.now()-86400000);
    const yStr = yesterday.getFullYear()+'-'+String(yesterday.getMonth()+1).padStart(2,'0')+'-'+String(yesterday.getDate()).padStart(2,'0');
    s.currentStreak = (s.lastActiveDate===yStr) ? s.currentStreak+1 : 1;
    s.longestStreak = Math.max(s.longestStreak, s.currentStreak);
    s.lastActiveDate = today;
    s.totalSessions = (s.totalSessions||0)+1;
  }
  try{ localStorage.setItem(STREAK_KEY, JSON.stringify(s)); }catch(e){}
  return s;
}

// ── QUIZ LOGIC ────────────────────────────────────────────────────────────────
function startQuiz(catKey,examKey,test,returnScreen){
  S.activeCatKey=catKey; S.activeExamKey=examKey;
  S.activeExam=(catKey && DATA[catKey] && DATA[catKey].exams) ? DATA[catKey].exams[examKey] : null;
  S.returnScreen = returnScreen || 'tests';
  S.test={...test,questions:[...test.questions]};
  S.qi=0;S.ans={};S.flagged=new Set();S.visited=new Set([0]);
  S.timeLeft=test.duration*60;S.startTime=Date.now();
  S.navOpen=false;S.confirm=false;S.reviewOpen=false;S.stopConfirm=false;
  S.screen='quiz';render();startTimer();
}
function startTimer(){
  clearInterval(timerHandle);
  timerHandle=setInterval(()=>{
    S.timeLeft=Math.max(0,S.timeLeft-1);
    if(S.timeLeft===0){clearInterval(timerHandle);submit();return;}
    const d=document.getElementById('timerDisp');
    if(d){
      d.textContent='⏱ '+fmt(S.timeLeft);
      if(S.timeLeft<60){d.style.background='rgba(248,113,113,0.15)';d.style.color=Q.red;}
    }
  },1000);
}
function goQ(idx){S.visited.add(idx);S.qi=idx;S.navOpen=false;render();}

  if(S.startTime) S.timeTaken=Math.floor((Date.now()-S.startTime)/1000);

function getResults(){
  if(!S.test) return null;
  let correct=0,wrong=0;
  S.test.questions.forEach((q,i)=>{
    if(S.ans[i]===undefined) return;
    S.ans[i]===q.ans?correct++:wrong++;
  });
  const total=S.test.questions.length;
  return{correct,wrong,unattempted:total-correct-wrong,score:Math.round((correct/total)*100),total};
}

function getSubjectBreakdown(){
  if(!S.test) return null;
  const hasSubjects = S.test.questions.some(q=>q.subject);
  if(!hasSubjects) return null;
  const bySubject = {};
  S.test.questions.forEach((q,i)=>{
    const subj = q.subject || 'Other';
    if(!bySubject[subj]) bySubject[subj] = {correct:0,wrong:0,unattempted:0,total:0};
    bySubject[subj].total++;
    const ua = S.ans[i];
    if(ua===undefined) bySubject[subj].unattempted++;
    else if(ua===q.ans) bySubject[subj].correct++;
    else bySubject[subj].wrong++;
  });
  return bySubject;
}

function subjectTip(subject){
  const key = String(subject||'').toLowerCase().trim();
  return SUBJECT_TIPS[key] || ('Review your basics in '+subject+' and practice more MCQs regularly to build confidence.');
}

function buildQuizInsights(results, breakdown, singleSubject){
  const strengths=[], weaknesses=[], tips=[];
  if(breakdown){
    const rows=[];
    Object.keys(breakdown).forEach(subj=>{
      const b=breakdown[subj];
      const attempted=b.correct+b.wrong;
      if(!attempted) return; // fully skipped subject — not enough info to judge
      const accuracy=Math.round((b.correct/attempted)*100);
      rows.push({subj,accuracy});
      if(accuracy>=80) strengths.push(subj+' — '+accuracy+'% accuracy');
      else if(accuracy<50){ weaknesses.push(subj+' — '+accuracy+'% accuracy'); tips.push(subjectTip(subj)); }
    });
    // if nothing crossed the absolute weak threshold, still call out the relatively weakest subject
    if(!weaknesses.length && rows.length>1){
      const worst = rows.reduce((a,b)=> (b.accuracy<a.accuracy ? b : a));
      weaknesses.push(worst.subj+' — your relatively weakest subject ('+worst.accuracy+'% accuracy)');
      tips.push(subjectTip(worst.subj));
    }
  } else if(singleSubject){
    const attempted=results.correct+results.wrong;
    if(attempted){
      const accuracy=Math.round((results.correct/attempted)*100);
      if(accuracy>=80) strengths.push(singleSubject+' — '+accuracy+'% accuracy');
      else if(accuracy<50){ weaknesses.push(singleSubject+' — '+accuracy+'% accuracy'); tips.push(subjectTip(singleSubject)); }
    }
  }
  if(results.unattempted > results.total*0.2){
    weaknesses.push(results.unattempted+' question(s) left unattempted');
    tips.push('Try to attempt every question — even an educated guess has a chance, while a skip guarantees zero.');
  }
  if(results.score>=80) strengths.push('Strong overall score ('+results.score+'%)');
  if(!strengths.length) strengths.push('Keep practicing — your strengths will show up as you build consistency.');
  if(!weaknesses.length) weaknesses.push('No major weak areas found in this test — well done!');
  return { strengths, weaknesses, tips:[...new Set(tips)] };
}
function qStatus(i){
  if(!S.visited.has(i)) return 'unvisited';
  const a=S.ans[i]!==undefined,f=S.flagged.has(i);
  if(a&&f) return 'ans-flag';if(a) return 'answered';if(f) return 'flagged';return 'visited';
}
function totalExams(){return Object.values(DATA).reduce((a,c)=>a+Object.keys(c.exams).length,0);}
function totalTests(){return Object.values(DATA).reduce((a,c)=>a+Object.values(c.exams).reduce((b,e)=>b+e.tests.length,0),0);}
function qCount(t){return t.questions?t.questions.length:(t.questionCount||0);}
function totalQuestions(){return Object.values(DATA).reduce((a,c)=>a+Object.values(c.exams).reduce((b,e)=>b+e.tests.reduce((d,t)=>d+qCount(t),0),0),0);}

  root.appendChild(body);root.appendChild(Footer());

  const cat=DATA[S.activeCatKey];
  const accent=cat?cat.color:'#0ea5e9';
  const C=2*Math.PI*58,filled=(score/100)*C;
  const ringColor=score>=75?Q.green:score>=40?accent:Q.red;
  const root=el('div',{css:`min-height:100vh;background:${Q.bg};font-family:'DM Sans',sans-serif;color:${Q.text};`});

  sw.appendChild(el('div',{css:`font-size:12px;color:${Q.muted};margin-top:4px;`,text:`Time: ${Math.floor(S.timeTaken/60)}m ${S.timeTaken%60}s`}));
  body.appendChild(sw);
  const sg=el('div',{css:'display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;'});
  [[Q.green,'✓','Correct',correct],[Q.red,'✗','Wrong',wrong],[Q.dim,'–','Skipped',unattempted],[Q.muted,'⏱','Duration',`${S.test.duration}m`]].forEach(([c,ic,lb,vl])=>{

    body.appendChild(note);
  }

  const strengthBox=el('div',{css:`background:${Q.green}15;border:1px solid ${Q.green}40;border-radius:12px;padding:14px;`});
  strengthBox.appendChild(el('div',{css:`font-family:Syne,sans-serif;font-weight:700;font-size:12px;color:${Q.green};margin-bottom:8px;`,text:'💪 Strengths'}));
  insights.strengths.forEach(s=>strengthBox.appendChild(el('div',{css:`font-size:11px;color:${Q.text};margin-bottom:5px;line-height:1.4;`,text:'• '+s})));
  swGrid.appendChild(strengthBox);
  const weakBox=el('div',{css:`background:${Q.red}15;border:1px solid ${Q.red}40;border-radius:12px;padding:14px;`});
  weakBox.appendChild(el('div',{css:`font-family:Syne,sans-serif;font-weight:700;font-size:12px;color:${Q.red};margin-bottom:8px;`,text:'🎯 Areas to Improve'}));
  insights.weaknesses.forEach(s=>weakBox.appendChild(el('div',{css:`font-size:11px;color:${Q.text};margin-bottom:5px;line-height:1.4;`,text:'• '+s})));

      card.appendChild(row);
      // Always show the correct answer, regardless of whether the student got it right, wrong, or skipped it
      const ct=S.lang==='hi'&&q.opts_hi?`सही उत्तर: ${q.opts_hi[q.ans]} (${q.opts[q.ans]})`:`Correct Answer: ${q.opts[q.ans]}`;

function slugify(s){
  return String(s||'').toLowerCase().trim().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
}

async function loadSubjectsMeta(){
  if(SUBJECTS_META) return SUBJECTS_META;
  try{
    const res = await fetch('subjects_meta.json');
    if(!res.ok) throw new Error('not found');
    SUBJECTS_META = await res.json();
  }catch(e){
    SUBJECTS_META = {};
  }
  return SUBJECTS_META;
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

async function launchSubjectPractice(slug, name, count){
  const listWrap=document.getElementById('subjectsList');
  if(listWrap) listWrap.innerHTML='<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px;">Loading questions...</div>';
  try{
    if(!SUBJECT_CACHE[slug]){
      const res = await fetch('subjects/'+slug+'.json');
      if(!res.ok) throw new Error('Failed to load subject data');
      const data = await res.json();
      SUBJECT_CACHE[slug] = data.questions || [];
    }
    const pool = SUBJECT_CACHE[slug];
    const sampleSize = Math.min(20, pool.length);
    const questions = shuffle(pool).slice(0, sampleSize);

    const test = { id:'subject-'+slug+'-'+Date.now(), title:name+' — Subject Practice', duration, difficulty:'Mixed', questions, practiceSubject:name };
    startQuiz(null, null, test, 'subjectsHome');
  }catch(e){
    if(listWrap) listWrap.innerHTML='<div style="text-align:center;padding:30px;color:#dc2626;font-size:13px;">Could not load this subject right now. Please try again.</div>';
  }
}

function buildRepeatedText(base, durationSec){
  // Generous upper bound so even a very fast typist (100+ WPM) never runs out of text before time is up
  const estCharsNeeded = Math.ceil((durationSec/60) * 110 * 5) + 500;
  let out = base;
  while(out.length < estCharsNeeded){ out += ' ' + base; }
  return out;
}

function startTypingTest(passage){
  T.passage=passage;T.fullText=buildRepeatedText(passage.text,T.duration);T.typed='';T.startTime=null;T.timeLeft=T.duration;T.finished=false;T.results=null;T.corrections=0;
  S.screen='typingTest';render();
}

    css:'width:100%;padding:14px;border:2px solid #0891b2;border-radius:12px;font-size:15px;font-family:inherit;resize:none;outline:none;'
  });
  body.appendChild(inputBox);
  body.appendChild(el('button',{css:'width:100%;margin-top:14px;padding:12px;background:#f1f5f9;border:1px solid #e2e8f0;color:#64748b;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;',text:'Finish Now',onClick:()=>finishTypingTest('manual')}));

  root.appendChild(body);

  // wire up input handling after DOM is attached
  setTimeout(()=>{
    inputBox.focus();
    inputBox.addEventListener('input', onTypingInput);
    inputBox.addEventListener('keydown', e=>{ if(e.key==='Backspace'||e.key==='Delete') T.corrections++; });
  }, 0);

  return root;
}

function onTypingInput(e){
  if(T.finished) return;
  if(!T.startTime){ T.startTime=Date.now(); startTypingTimer(); }
  T.typed = e.target.value;
  updateTypingDisplay();
  if(T.typed.length >= T.fullText.length){ finishTypingTest('complete'); }
}

function charCategory(ch){
  if(/[0-9]/.test(ch)) return 'numbers';
  if(/\s/.test(ch)) return 'spaces';
  if(/[a-zA-Zअ-ह]/.test(ch)) return 'letters';
  return 'punctuation';
}

function updateTypingDisplay(){
  const target = T.fullText;
  let errors = 0;
  for(let i=0;i<T.typed.length;i++){
    const span = document.getElementById('ch'+i);
    if(!span) continue;
    const isCorrect = T.typed[i] === target[i];
    if(!isCorrect) errors++;
    span.style.color = isCorrect ? '#16a34a' : '#dc2626';
    span.style.textDecoration = isCorrect ? 'none' : 'underline';
    span.style.background = 'transparent';
  }
  const curSpan = document.getElementById('ch'+T.typed.length);
  if(curSpan){
    curSpan.style.color = '#0f172a';
    curSpan.style.background = '#0891b230';
    curSpan.scrollIntoView({block:'nearest'});
  }
  for(let i=T.typed.length+1;i<Math.min(target.length,T.typed.length+400);i++){
    const span = document.getElementById('ch'+i);
    if(!span) continue;
    span.style.color = '#cbd5e1';
    span.style.background = 'transparent';
    span.style.textDecoration = 'none';
  }
  const elapsedMin = T.startTime ? Math.max((Date.now()-T.startTime)/60000, 1/60) : 1/60;
  const correctChars = T.typed.length - errors;
  const wpm = Math.max(0, Math.round((correctChars/5)/elapsedMin));
  const accuracy = T.typed.length ? Math.round((correctChars/T.typed.length)*100) : 100;
  const wpmEl=document.getElementById('statWPM'), accEl=document.getElementById('statAccuracy'), errEl=document.getElementById('statErrors');
  if(wpmEl) wpmEl.textContent = String(wpm);
  if(accEl) accEl.textContent = accuracy+'%';
  if(errEl) errEl.textContent = String(errors);
}

function startTypingTimer(){
  clearInterval(typingTimerHandle);
  typingTimerHandle = setInterval(()=>{
    T.timeLeft = Math.max(0, T.timeLeft-1);
    const d=document.getElementById('typingTimerDisp');
    if(d){
      d.textContent = '⏱ '+fmt(T.timeLeft);
      if(T.timeLeft<10){ d.style.background='#fef2f2'; d.style.color='#dc2626'; }
    }
    if(T.timeLeft===0){ finishTypingTest('timeup'); }
  },1000);
}
function stopTypingTimer(){ clearInterval(typingTimerHandle); }

function finishTypingTest(reason){
  if(T.finished) return;
  T.finished = true;
  stopTypingTimer();
  const target = T.fullText;
  const typed = T.typed;
  let errors = 0;
  const compareLen = Math.min(typed.length, target.length);

  // category-level breakdown for weak/strong-point analysis
  const cats = { letters:{total:0,wrong:0}, numbers:{total:0,wrong:0}, punctuation:{total:0,wrong:0}, spaces:{total:0,wrong:0} };
  for(let i=0;i<compareLen;i++){
    const cat = charCategory(target[i]);
    cats[cat].total++;
    if(typed[i]!==target[i]){ errors++; cats[cat].wrong++; }
  }

  const elapsedSec = T.startTime ? (Date.now()-T.startTime)/1000 : T.duration - T.timeLeft;
  const elapsedMin = Math.max(elapsedSec/60, 1/60);
  const correctChars = typed.length - errors;
  const wpm = Math.max(0, Math.round((correctChars/5)/elapsedMin));
  const accuracy = typed.length ? Math.round((correctChars/typed.length)*100) : 0;
  const correctionRate = typed.length ? Math.round((T.corrections/typed.length)*100) : 0;

  T.results = { wpm, accuracy, errors, typedChars: typed.length, totalChars: target.length,
    timeTaken: Math.round(elapsedSec), reason, cats, corrections: T.corrections, correctionRate };
  if(typed.length>=15) recordActivity();
  S.screen='typingResults';render();
}

const CATEGORY_LABELS = { letters:'Letters', numbers:'Numbers', punctuation:'Punctuation', spaces:'Spacing' };
const CATEGORY_TIPS = {
  letters:'Practice touch typing without looking at the keyboard — it builds accuracy on letter keys fastest.',
  numbers:'Spend a few minutes daily on the number row (1–0) — it\'s usually the least-practiced part of the keyboard.',
  punctuation:'Slow down slightly around commas, periods and other punctuation — these are commonly rushed and mistyped.',
  spaces:'You\'re mistiming the spacebar — this usually means rushing to the next word. Slow down slightly between words.'
};

function buildTypingInsights(r){
  const strengths=[], weaknesses=[], tips=[];
  if(r.typedChars<15){
    return { strengths:['Not enough was typed to analyze — try completing more of the passage next time.'],
             weaknesses:['No data to analyze yet'], tips:[] };
  }
  const catRates = Object.keys(r.cats)
    .map(cat=>({cat, ...r.cats[cat], rate: r.cats[cat].total ? r.cats[cat].wrong/r.cats[cat].total : null}))
    .filter(c=>c.total>=3);
  catRates.forEach(c=>{
    if(c.rate<=0.04) strengths.push(CATEGORY_LABELS[c.cat]+' — very accurate');
    else if(c.rate>0.15){ weaknesses.push(CATEGORY_LABELS[c.cat]+' — '+Math.round(c.rate*100)+'% error rate'); tips.push(CATEGORY_TIPS[c.cat]); }
  });
  // if nothing crossed the absolute weakness threshold, still call out the relatively weakest category as a growth area
  if(!weaknesses.length && catRates.length){
    const worst = catRates.reduce((a,b)=> (b.rate>a.rate ? b : a));
    if(worst.rate>0){ weaknesses.push(CATEGORY_LABELS[worst.cat]+' — your relatively weakest area ('+Math.round(worst.rate*100)+'% error rate)'); tips.push(CATEGORY_TIPS[worst.cat]); }
  }
  if(r.accuracy>=95) strengths.push('Overall accuracy is excellent');
  else if(r.accuracy<85){ weaknesses.push('Overall accuracy ('+r.accuracy+'%) needs work'); tips.push('Focus on accuracy over speed for now — a slower, error-free pace naturally gets faster with practice.'); }
  if(r.wpm>=40) strengths.push('Good typing speed ('+r.wpm+' WPM)');
  else if(r.wpm<20){ weaknesses.push('Typing speed ('+r.wpm+' WPM) is on the slower side'); tips.push('Practice for just 10–15 minutes daily rather than long, infrequent sessions — consistency builds speed fastest.'); }
  if(r.correctionRate>15){ weaknesses.push('Frequent corrections ('+r.correctionRate+'% of keystrokes were backspace/delete)'); tips.push('You\'re backspacing a lot — try typing each word deliberately once rather than rushing and correcting.'); }
  if(!strengths.length) strengths.push('Keep practicing — your strengths will show up as you build consistency.');
  if(!weaknesses.length) weaknesses.push('No major weak areas found in this test — well done!');
  return { strengths, weaknesses, tips: [...new Set(tips)] };
}

const EXAM_CACHE = {};
async function loadFullTest(examKey, testId, metaTest){
  if(!EXAM_CACHE[examKey]){
    const res = await fetch(`${examKey}.json`);
    if(!res.ok) throw new Error('Failed to load exam data');
    EXAM_CACHE[examKey] = await res.json();
  }
  const full = EXAM_CACHE[examKey].tests.find(x=>x.id===testId);
  return full || metaTest;
}
async function boot(){
  try{
    const res = await fetch('meta.json');
    DATA = await res.json();
  }catch(e){
    console.error('Failed to load MockAdda data', e);
    DATA = {};
  }
  S.screen='home';
  render();
}
